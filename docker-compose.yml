services:

  db:
    image: mysql:8.0
    container_name: sgi-full-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: db_sgi_emch
    volumes:
      - full_mysql_data:/var/lib/mysql
      - ./db_sgi_emch.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    # sin ports: la DB solo es accesible desde la red interna
    networks:
      - sgi_internal
      - proxy_network   # permite que Adminer la alcance
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgi-full-backend
    restart: unless-stopped
    # sin ports: solo accesible desde el frontend via sgi_app
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/db_sgi_emch?useSSL=false&serverTimezone=America/Lima&characterEncoding=UTF-8&allowPublicKeyRetrieval=true"
    volumes:
      - full_pdf_storage:/app/storage/actas
    networks:
      - sgi_internal  # habla con la DB
      - sgi_app       # alcanzable por el frontend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  backup:
    build:
      context: ./backend/backup
      dockerfile: Dockerfile
    container_name: sgi-full-backup
    restart: unless-stopped
    command: >
      sh -c "
        printenv | grep -E '^(MYSQL_|MAX_BACKUPS)' > /etc/env_backup &&
        chmod 600 /etc/env_backup &&
        chmod +x /backup.sh &&
        crond -f -l 2
      "
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASS: ${DB_PASSWORD:-root}
      MYSQL_DB: db_sgi_emch
      MAX_BACKUPS: "7"
    volumes:
      - ./backend/backups:/backups
      - ./backend/backup/backup.sh:/backup.sh
      - ./backend/backup/crontab:/etc/crontabs/root
    networks:
      - sgi_internal
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: sgi-full-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - full_redis_data:/data
    networks:
      - sgi_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""  # vacío = URLs relativas; Nginx proxea /api/* al backend
    container_name: sgi-full-frontend
    restart: unless-stopped
    networks:
      - sgi_app       # para proxear al backend
      - proxy_network # expuesto a Nginx Proxy Manager
    depends_on:
      backend:
        condition: service_healthy

  docs:
    build:
      context: ./docusaurus
      dockerfile: Dockerfile
      target: production
    container_name: sgi-full-docs
    restart: unless-stopped
    networks:
      - proxy_network   # solo necesita ser alcanzable por Nginx Proxy Manager

volumes:
  full_mysql_data:
  full_pdf_storage:
  full_redis_data:

networks:
  sgi_internal:
    driver: bridge
  sgi_app:
    driver: bridge
  proxy_network:
    external: true  # red existente de Nginx Proxy Manager
