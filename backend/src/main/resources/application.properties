spring.application.name=sgi-emch
spring.config.import=optional:file:.env[.properties]

# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ── Base de Datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/db_sgi_emch?useSSL=false&serverTimezone=America/Lima&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:c2dpLWVtY2gtc2VjcmV0LWtleS1taW5pbXVtLTI1Ni1iaXRzLXJlcXVpcmVkLWNoYW5nZS1pbi1wcm9k}
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=86400000

# ── Spring Mail / SMTP ────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=CORREO_DTIC
spring.mail.password=CAMBIAR_EN_PRODUCCION
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── Subida de archivos ─────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Almacenamiento de actas PDF ───────────────────────────────────────────────
app.storage.pdf-path=./storage/actas
