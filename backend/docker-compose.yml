services:

  db:
    image: mysql:8.0
    container_name: sgi-emch-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: db_sgi_emch
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_sgi_emch.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    # sin ports: la DB solo es accesible desde la red interna
    networks:
      - sgi_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgi-emch-backend
    restart: unless-stopped
    # sin ports: NPM accede por proxy_network usando el nombre del contenedor
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/db_sgi_emch?useSSL=false&serverTimezone=America/Lima&characterEncoding=UTF-8&allowPublicKeyRetrieval=true"
    volumes:
      - pdf_storage:/app/storage/actas
    networks:
      - sgi_internal    # para hablar con la DB
      - proxy_network   # para ser alcanzado por NPM
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: sgi-emch-backup
    restart: unless-stopped
    # Escribe las variables de entorno para que crond las pueda leer,
    # luego da permisos al script y arranca el demonio de cron.
    command: >
      sh -c "
        printenv | grep -E '^(MYSQL_|MAX_BACKUPS)' > /etc/env_backup &&
        chmod 600 /etc/env_backup &&
        chmod +x /backup.sh &&
        crond -f -l 2
      "
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASS: ${DB_PASSWORD:-root}
      MYSQL_DB: db_sgi_emch
      MAX_BACKUPS: "7"
    volumes:
      - ./backups:/backups          # archivos .sql.gz visibles en el servidor
      - ./backup/backup.sh:/backup.sh         # editable sin rebuild
      - ./backup/crontab:/etc/crontabs/root   # horario editable sin rebuild
    networks:
      - sgi_internal
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  pdf_storage:

networks:
  sgi_internal:
    driver: bridge
  proxy_network:
    external: true   # red existente de Nginx Proxy Manager
