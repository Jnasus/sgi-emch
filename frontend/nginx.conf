server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Bloquea rutas sensibles que no existen en el SPA (evita que el scanner
    # reciba 200 + index.html en lugar de un 404 honesto)
    location ~* ^/(\.env|\.git|Dockerfile|docker-compose|aws|\.htaccess|\.DS_Store|wp-admin|wp-login|xmlrpc|config\.php|\.well-known/security) {
        return 404;
    }
    # Cualquier ruta que empiece con punto (ocultos de Unix)
    location ~ /\. {
        return 404;
    }

    # Proxy API calls to the backend container (internal network only)
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
