global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sgi-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sgi-full-backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sgi-backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
