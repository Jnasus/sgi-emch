services:

  prometheus:
    image: prom/prometheus:latest
    container_name: sgi-full-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - monitoring_network
      - sgi_internal        # necesita alcanzar al backend para scrapearlo

  loki:
    image: grafana/loki:2.9.10   # pinado: 3.x rompe boltdb-shipper + schema v11
    container_name: sgi-full-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - monitoring_network

  promtail:
    # Promtail 3.0.0: primer release que usa Docker client API ≥1.44.
    # Promtail 2.9.x usa API 1.42 (hardcoded en el SDK de Go) y el daemon
    # del servidor rechaza versiones < 1.44. No hay otra forma de arreglarlo
    # en 2.x. Promtail 3.x es compatible con Loki 2.9 vía HTTP push API.
    image: grafana/promtail:3.0.0
    container_name: sgi-full-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    networks:
      - monitoring_network
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:latest
    container_name: sgi-full-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: sgi-full-cadvisor
    restart: unless-stopped
    # privileged: necesario para métricas de disco I/O por contenedor en Linux
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - monitoring_network

  grafana:
    # Pinado a 11.x: Grafana 12 (latest) tiene un bug en el provisioning
    # de datasources con UIDs fijos que causa crash loop al arrancar.
    image: grafana/grafana:11.5.2
    container_name: sgi-full-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Cambia este valor al subdominio real antes de pedir el cert SSL
      GF_SERVER_ROOT_URL: https://sgi-grafana.escuelamilitar.edu.pe
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring_network
      - proxy_network       # accesible desde Nginx Proxy Manager
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  monitoring_network:
    driver: bridge
  sgi_internal:
    external: true          # red del proyecto SGI (name: sgi_internal fijado en docker-compose.yml)
  proxy_network:
    external: true          # red de Nginx Proxy Manager
